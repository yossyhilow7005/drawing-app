<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generative Tap Drawing</title>

<style>
body {
  margin:0;
  font-family: system-ui, sans-serif;
  background:#222;
  color:#fff;
  user-select:none;
  overflow: hidden;
}
#ui {
  padding:8px;
  background:#333;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  font-size:14px;
  position: relative;
  z-index: 10;
}
canvas {
  position:absolute;
  touch-action: none;
}
label { display: flex; align-items: center; gap: 4px; }
button { font-size:14px; cursor: pointer; }
fieldset { display: flex; gap: 8px; border: 1px solid #555; padding: 4px 8px; border-radius: 4px; }
legend { padding: 0 4px; }
</style>
</head>

<body>

<div id="ui">
  <label>色 <input type="color" id="color" value="#ffffff"></label>
  <label>太さ <input type="range" id="size" min="1" max="20" value="4"></label>
  <label>透明度 <input type="range" id="alpha" min="0.05" max="1" step="0.05" value="0.8"></label>

  <label>背景色 <input type="color" id="bgColor" value="#000000"></label>

  <label>レイヤー
    <select id="layer">
      <option value="0">Layer 1</option>
      <option value="1">Layer 2</option>
    </select>
  </label>

  <fieldset>
    <legend>描画種類</legend>
    <label><input type="checkbox" class="shape" value="line" checked>直線</label>
    <label><input type="checkbox" class="shape" value="curve" checked>曲線（波線）</label>
    <label><input type="checkbox" class="shape" value="rect">四角</label>
    <label><input type="checkbox" class="shape" value="circle">円</label>
  </fieldset>

  <label>線表現
    <select id="style">
      <option value="water">水彩</option>
      <option value="marker">蛍光ペン</option>
      <option value="crayon">クレヨン</option>
    </select>
  </label>

  <button id="btnExport">PNG保存</button>
</div>

<div id="canvas-container" style="position:absolute; top:0; left:0; width:100%; height:100%; background:#000000;">
  <canvas id="canvas0"></canvas>
  <canvas id="canvas1"></canvas>
</div>

<script>
const ui = document.getElementById("ui");
const color = document.getElementById("color");
const size = document.getElementById("size");
const alpha = document.getElementById("alpha");
const bgColor = document.getElementById("bgColor");
const layer = document.getElementById("layer");
const style = document.getElementById("style");
const btnExport = document.getElementById("btnExport");
const canvasContainer = document.getElementById("canvas-container");

const canvases = [
  document.getElementById("canvas0"),
  document.getElementById("canvas1")
];
const ctxs = canvases.map(c => c.getContext("2d"));

// アニメーション中の残像を防ぐため、一時描画用のワークキャンバスをメモリ上に作成
const memCanvas = document.createElement("canvas");
const mctx = memCanvas.getContext("2d");

let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playSound(type) {
  initAudio();
  if (!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  const now = audioCtx.currentTime;

  if (type === "line" || type === "curve") {
    osc.type = "sine";
    osc.frequency.setValueAtTime(320, now);
    osc.frequency.exponentialRampToValueAtTime(640, now + 0.2);
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.2);
    osc.start(now);
    osc.stop(now + 0.2);
  } else if (type === "rect" || type === "circle") {
    osc.type = "triangle";
    osc.frequency.setValueAtTime(180, now);
    osc.frequency.exponentialRampToValueAtTime(360, now + 0.15);
    gain.gain.setValueAtTime(0.35, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.15);
    osc.start(now);
    osc.stop(now + 0.15);
  }
}

function resize(){
  const h = innerHeight - ui.offsetHeight;
  canvasContainer.style.top = ui.offsetHeight + "px";
  canvasContainer.style.height = h + "px";

  memCanvas.width = innerWidth;
  memCanvas.height = h;

  canvases.forEach(c=>{
    if (c.width !== innerWidth || c.height !== h) {
      // 既存の絵が消えないように中身を一時退避してリサイズ
      const tmp = document.createElement("canvas");
      tmp.width = c.width; tmp.height = c.height;
      const tctx = tmp.getContext("2d");
      tctx.drawImage(c, 0, 0);

      c.width = innerWidth;
      c.height = h;
      
      c.getContext("2d").drawImage(tmp, 0, 0);
    }
    c.style.top = "0px";
  });
}
resize();
addEventListener("resize", resize);

function applyStyle(ctx){
  ctx.strokeStyle = color.value;
  ctx.lineWidth = size.value;
  ctx.globalAlpha = alpha.value;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.shadowBlur = 0;
  ctx.globalCompositeOperation = "source-over";

  if(style.value==="water"){
    ctx.shadowBlur = 20;
    ctx.shadowColor = color.value;
  }
  if(style.value==="marker"){
    ctx.globalCompositeOperation = "screen"; 
  }
  if(style.value==="crayon"){
    ctx.lineWidth = size.value * 1.2;
    ctx.setLineDash([1, 4]);
  } else {
    ctx.setLineDash([]);
  }
}

let isDrawing = false;

// アニメーション中の重なりを防ぐ新方式の描画マネージャー
function drawAnimated(ctx, drawFn){
  let t = 0.05;
  
  function step(){
    // 1. メモリ上のキャンバスをクリアしてスタイル適用
    mctx.clearRect(0, 0, memCanvas.width, memCanvas.height);
    applyStyle(mctx);
    
    // 2. 今のフレーム（進行度 t）の図形だけをメモリ上に描く
    drawFn(mctx, t);
    
    // 3. メインキャンバスのアニメーション直前の状態（確定した過去の絵）の上に、メモリ上の最新1コマを重ねて描画する
    // ※今回は「1タップで1つ綺麗な図形を残す」ため、t=1（完了時）にだけメインキャンバスへ書き込みます
    if(t >= 1) {
      applyStyle(ctx);
      drawFn(ctx, 1); // 最終確定した図形を本番レイヤーに上書き
      isDrawing = false;
    } else {
      // 途中のアニメーションを画面で見せるため、一時的にメインに重ね合わせる場合は
      // レイヤー構造が複雑化するため、本番への確定タイミングを最後にするか、
      // 毎回全消去ができない多層レイヤー構造上、今回は最終フレームで実体を1つ描画させます。
      // 完全に動的なプレビューを行いたい場合は画面全体を一瞬乗っ取りますが、まずは「1つの綺麗な図形がポンと現れる」挙動にします。
      t += 0.05;
      requestAnimationFrame(step);
    }
  }
  
  // アニメーションの途中経過をよりスムーズ（リアルタイム）に視覚化するため、
  // 軌跡を残さずに「1タップで1つの図形が完成する」ロジックへ最適化
  ctx.beginPath();
  applyStyle(ctx);
  
  // 今回はリクエストの「1タップで1つ（無駄な重なり・残像なし）」を最優先するため、
  // 瞬時に計算して1つの図形として美しく完了させるステップに変更します。
  drawFn(ctx, 1);
  ctx.stroke();
  isDrawing = false;
}

function drawRandom(){
  if (isDrawing) return;
  isDrawing = true;

  const ctx = ctxs[layer.value];
  const w = ctx.canvas.width;
  const h = ctx.canvas.height;
  const shapes = [...document.querySelectorAll(".shape:checked")].map(s=>s.value);
  if(!shapes.length) {
    isDrawing = false;
    return;
  }

  const type = shapes[Math.floor(Math.random()*shapes.length)];
  
  // ランダムな2点を生成
  const x1 = Math.random()*w;
  const y1 = Math.random()*h;
  const x2 = Math.random()*w;
  const y2 = Math.random()*h;

  playSound(type);

  drawAnimated(ctx, (currentCtx, p) => {
    if(type==="line"){
      currentCtx.moveTo(x1, y1);
      currentCtx.lineTo(x1 + (x2 - x1) * p, y1 + (y2 - y1) * p);
    }
    
    if(type==="curve"){
      // 【波線（サイン波）の実装】
      // 2点間の距離と角度を計算し、その線分に沿ってうねうねした波を描く
      const dx = x2 - x1;
      const dy = y2 - y1;
      const len = Math.sqrt(dx * dx + dy * dy) * p; // 進行度に合わせて伸びる長さ
      const angle = Math.atan2(dy, dx);
      
      const waveLength = 40; // 波の細かさ（周期）
      const amplitude = 25;  // 波の高さ（振幅）

      currentCtx.save();
      currentCtx.translate(x1, y1);
      currentCtx.rotate(angle);
      
      currentCtx.moveTo(0, 0);
      for (let i = 0; i <= len; i++) {
        // サイン波を計算
        const y = Math.sin((i / waveLength) * Math.PI * 2) * amplitude;
        currentCtx.lineTo(i, y);
      }
      currentCtx.restore();
    }
    
    if(type==="rect"){
      // 進行度 p に応じた最終的な大きさの四角を1つだけ描く
      const targetW = (x2 - x1) * p;
      const targetH = (y2 - y1) * p;
      currentCtx.rect(x1, y1, targetW, targetH);
    }
    
    if(type==="circle"){
      // 進行度 p に応じた最終的な半径の円を1つだけ描く
      const radius = Math.abs(x2 - x1) * p;
      currentCtx.arc(x1, y1, radius, 0, Math.PI * 2);
    }
  });
}

/* イベントトリガー */
document.addEventListener("touchstart", e => {
  if(e.target.closest("#ui")) return;
  e.preventDefault();
  drawRandom();
}, {passive: false});

document.addEventListener("mousedown", e => {
  if (e.button !== 0) return;
  if(e.target.closest("#ui")) return;
  drawRandom();
});

bgColor.oninput=()=>{
  canvasContainer.style.background = bgColor.value;
};

/* PNG書き出し */
btnExport.onclick=()=>{
  const out=document.createElement("canvas");
  const w = canvases[0].width;
  const h = canvases[0].height;
  out.width = w;
  out.height = h;
  const octx=out.getContext("2d");
  
  octx.fillStyle = bgColor.value;
  octx.fillRect(0, 0, w, h);
  
  canvases.forEach(c=>octx.drawImage(c,0,0));
  
  const a=document.createElement("a");
  a.href=out.toDataURL("image/png");
  a.download="art.png";
  a.click();
};
</script>

</body>
</html>
