<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generative Tap Drawing</title>

<style>
body {
  margin:0;
  font-family: system-ui, sans-serif;
  background:#222;
  color:#fff;
  user-select:none;
}
#ui {
  padding:8px;
  background:#333;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  font-size:14px;
}
canvas {
  touch-action: manipulation;
  display:block;
}
label { margin-right:6px; }
</style>
</head>

<body>

<div id="ui">
  <label>色 <input type="color" id="color" value="#ffffff"></label>
  <label>太さ <input type="range" id="size" min="1" max="20" value="4"></label>
  <label>透明度 <input type="range" id="alpha" min="0.05" max="1" step="0.05" value="0.8"></label>

  <label>背景色 <input type="color" id="bgColor" value="#000000"></label>
  <label>背景画像 <input type="file" id="bgImage" accept="image/*"></label>

  <label>レイヤー
    <select id="layer">
      <option value="0">Layer 1</option>
      <option value="1">Layer 2</option>
    </select>
  </label>

  <fieldset>
    <legend>描画種類</legend>
    <label><input type="checkbox" class="shape" value="line" checked>直線</label>
    <label><input type="checkbox" class="shape" value="curve" checked>曲線</label>
    <label><input type="checkbox" class="shape" value="rect">四角</label>
    <label><input type="checkbox" class="shape" value="circle">円</label>
  </fieldset>

  <label>線表現
    <select id="style">
      <option value="water">水彩</option>
      <option value="marker">蛍光ペン</option>
      <option value="crayon">クレヨン</option>
    </select>
  </label>
</div>

<canvas id="canvas0"></canvas>
<canvas id="canvas1"></canvas>

<script>
const canvases = [
  document.getElementById("canvas0"),
  document.getElementById("canvas1")
];
const ctxs = canvases.map(c => c.getContext("2d"));

function resize(){
  canvases.forEach(c=>{
    c.width = innerWidth;
    c.height = innerHeight - document.getElementById("ui").offsetHeight;
    c.style.position="absolute";
    c.style.top=document.getElementById("ui").offsetHeight+"px";
  });
}
resize();
addEventListener("resize", resize);

const ui = {
  color: color,
  size: size,
  alpha: alpha,
  layer: layer,
  style: style
};

function applyStyle(ctx){
  ctx.strokeStyle = ui.color.value;
  ctx.fillStyle = ui.color.value;
  ctx.lineWidth = ui.size.value;
  ctx.globalAlpha = ui.alpha.value;
  ctx.lineCap = "round";

  if(ui.style.value==="water"){
    ctx.shadowBlur = 20;
    ctx.shadowColor = ui.color.value;
  } else if(ui.style.value==="marker"){
    ctx.globalCompositeOperation="lighter";
  } else {
    ctx.shadowBlur = 0;
    ctx.globalCompositeOperation="source-over";
  }
}

function drawAnimated(ctx, drawFn){
  let t=0;
  function step(){
    t+=0.05;
    if(t>=1){ drawFn(1); return; }
    drawFn(t);
    requestAnimationFrame(step);
  }
  step();
}

function drawRandom(){
  const ctx = ctxs[ui.layer.value];
  applyStyle(ctx);

  const w = ctx.canvas.width;
  const h = ctx.canvas.height;

  const shapes = [...document.querySelectorAll(".shape:checked")].map(s=>s.value);
  if(!shapes.length) return;

  const type = shapes[Math.floor(Math.random()*shapes.length)];
  const x1 = Math.random()*w;
  const y1 = Math.random()*h;
  const x2 = Math.random()*w;
  const y2 = Math.random()*h;

  drawAnimated(ctx,(p)=>{
    ctx.beginPath();
    if(type==="line"){
      ctx.moveTo(x1,y1);
      ctx.lineTo(x1+(x2-x1)*p,y1+(y2-y1)*p);
    }
    if(type==="curve"){
      ctx.moveTo(x1,y1);
      ctx.quadraticCurveTo(
        x1+(x2-x1)*p, y1,
        x1+(x2-x1)*p, y1+(y2-y1)*p
      );
    }
    if(type==="rect"){
      ctx.strokeRect(x1,y1,(x2-x1)*p,(y2-y1)*p);
    }
    if(type==="circle"){
      ctx.arc(x1,y1,Math.abs(x2-x1)*p,0,Math.PI*2);
    }
    ctx.stroke();
  });

  ctx.globalAlpha=1;
  ctx.shadowBlur=0;
  ctx.globalCompositeOperation="source-over";
}

const audio = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=");
function playSound(){
  audio.currentTime=0;
  audio.play();
}

canvases.forEach(c=>{
  c.addEventListener("pointerdown",()=>{
    playSound();
    drawRandom();
  });
});

bgColor.addEventListener("input",()=>{
  canvases.forEach(c=>{
    c.style.background = bgColor.value;
  });
});

bgImage.addEventListener("change",(e)=>{
  const img=new Image();
  img.onload=()=>{
    ctxs.forEach(ctx=>{
      ctx.drawImage(img,0,0,ctx.canvas.width,ctx.canvas.height);
    });
  };
  img.src=URL.createObjectURL(e.target.files[0]);
});
</script>

</body>
</html>
