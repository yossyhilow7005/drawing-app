<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPad Tap Drawing</title>

<style>
body {
  margin:0;
  background:#222;
  color:#fff;
  font-family:system-ui;
}
#ui {
  background:#333;
  padding:8px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  font-size:14px;
  position:relative;
  z-index:10;
}
canvas {
  position:absolute;
  left:0;
  top:0;
}
fieldset { border:1px solid #555; }
</style>
</head>

<body>

<div id="ui">
  色 <input type="color" id="color" value="#ffffff">
  太さ <input type="range" id="size" min="1" max="20" value="5">
  透明度 <input type="range" id="alpha" min="0.05" max="1" step="0.05" value="0.7">

  レイヤー
  <select id="layer">
    <option value="0">Layer 1</option>
    <option value="1">Layer 2</option>
  </select>

  <fieldset>
    <legend>描画種類</legend>
    <label><input type="checkbox" class="shape" value="line" checked>直線</label>
    <label><input type="checkbox" class="shape" value="curve">曲線</label>
    <label><input type="checkbox" class="shape" value="rect">四角</label>
    <label><input type="checkbox" class="shape" value="circle">円</label>
  </fieldset>

  <button id="clear">クリア</button>
  <button id="export">PNG保存</button>
</div>

<canvas id="c0"></canvas>
<canvas id="c1"></canvas>

<script>
const canvases=[c0,c1];
const ctxs=canvases.map(c=>c.getContext("2d"));

function resize(){
  const h=innerHeight-ui.offsetHeight;
  canvases.forEach(c=>{
    c.width=innerWidth;
    c.height=h;
    c.style.top=ui.offsetHeight+"px";
  });
}
resize();
addEventListener("resize",resize);

function applyStyle(ctx){
  ctx.strokeStyle=color.value;
  ctx.lineWidth=size.value;
  ctx.globalAlpha=alpha.value;
  ctx.lineCap="round";
}

function drawOnce(){
  const ctx=ctxs[layer.value];
  const shapes=[...document.querySelectorAll(".shape:checked")].map(s=>s.value);
  if(!shapes.length) return;

  applyStyle(ctx);

  const type=shapes[Math.floor(Math.random()*shapes.length)];
  const w=ctx.canvas.width, h=ctx.canvas.height;
  const x1=Math.random()*w, y1=Math.random()*h;
  const x2=Math.random()*w, y2=Math.random()*h;

  let t=0.05;
  function step(){
    ctx.beginPath();
    if(type==="line"){
      ctx.moveTo(x1,y1);
      ctx.lineTo(x1+(x2-x1)*t,y1+(y2-y1)*t);
    }
    if(type==="curve"){
      ctx.moveTo(x1,y1);
      ctx.quadraticCurveTo(x2,y1,x1+(x2-x1)*t,y1+(y2-y1)*t);
    }
    if(type==="rect"){
      ctx.strokeRect(x1,y1,(x2-x1)*t,(y2-y1)*t);
    }
    if(type==="circle"){
      ctx.arc(x1,y1,Math.abs(x2-x1)*t,0,Math.PI*2);
    }
    ctx.stroke();
    t+=0.05;
    if(t<=1) requestAnimationFrame(step);
  }
  step();
}

/* ★ Safari最重要ポイント */
document.addEventListener("touchstart",e=>{
  if(e.target.closest("#ui")) return;
  drawOnce();
},{passive:true});

document.addEventListener("mousedown",e=>{
  if(e.target.closest("#ui")) return;
  drawOnce();
});

clear.onclick=()=>ctxs[layer.value].clearRect(0,0,innerWidth,innerHeight);

export.onclick=()=>{
  const out=document.createElement("canvas");
  out.width=innerWidth;
  out.height=innerHeight-ui.offsetHeight;
  const octx=out.getContext("2d");
  canvases.forEach(c=>octx.drawImage(c,0,0));
  const a=document.createElement("a");
  a.href=out.toDataURL("image/png");
  a.download="art.png";
  a.click();
};
</script>

</body>
</html>
