<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Generative Drawing App</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  overscroll-behavior: none;
}

#toolbar {
  position: fixed;
  top: env(safe-area-inset-top);
  left: 0;
  right: 0;
  background: rgba(20,20,20,0.95);
  padding: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  z-index: 10;
}

button, input, select {
  font-size: 16px;
  min-height: 40px;
}

#canvasContainer {
  position: absolute;
  top: calc(env(safe-area-inset-top) + 90px);
  left: 0;
  right: 0;
  bottom: env(safe-area-inset-bottom);
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  touch-action: none;
}
</style>
</head>

<body>

<div id="toolbar">
  太さ <input type="range" id="size" min="1" max="40" value="12">
  透明度 <input type="range" id="alpha" min="0.05" max="1" step="0.05" value="1">

  色 <input type="color" id="colorPicker" value="#ffffff">

  背景色 <input type="color" id="bgColor" value="#000000">
  背景画像 <input type="file" id="bgImage" accept="image/*">

  <button id="clear">クリア</button>
</div>

<div id="canvasContainer"></div>

<script>
const container = document.getElementById("canvasContainer");

let layers = [];
let activeLayer = 1;
let drawing = false;

// ===== 背景レイヤー =====
const bgCanvas = document.createElement("canvas");
const bgCtx = bgCanvas.getContext("2d");
container.appendChild(bgCanvas);

// ===== 描画レイヤー =====
function createDrawLayer() {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  container.appendChild(canvas);
  layers.push({ canvas, ctx });
  resize();
}

function resize() {
  const h = container.clientHeight;
  const w = window.innerWidth;

  [bgCanvas, ...layers.map(l => l.canvas)].forEach(c => {
    c.width = w;
    c.height = h;
  });

  redrawBackground();
}
window.addEventListener("resize", resize);

// ===== 背景処理 =====
let bgImageObj = null;

function redrawBackground() {
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  bgCtx.fillStyle = document.getElementById("bgColor").value;
  bgCtx.fillRect(0,0,bgCanvas.width,bgCanvas.height);

  if (bgImageObj) {
    bgCtx.drawImage(bgImageObj, 0, 0, bgCanvas.width, bgCanvas.height);
  }
}

document.getElementById("bgColor").oninput = redrawBackground;

document.getElementById("bgImage").onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    bgImageObj = img;
    redrawBackground();
  };
  img.src = URL.createObjectURL(file);
};

// ===== 描画処理 =====
function randomDraw(ctx) {
  const w = ctx.canvas.width;
  const h = ctx.canvas.height;

  ctx.globalAlpha = Number(document.getElementById("alpha").value);
  ctx.strokeStyle = document.getElementById("colorPicker").value;
  ctx.lineWidth = document.getElementById("size").value;
  ctx.lineCap = "round";

  const x1 = Math.random()*w;
  const y1 = Math.random()*h;
  const x2 = Math.random()*w;
  const y2 = Math.random()*h;

  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();

  ctx.globalAlpha = 1;
}

container.addEventListener("pointerdown", e => {
  drawing = true;
  playSound();
  animateDraw();
});

function animateDraw() {
  if (!drawing) return;
  randomDraw(layers[0].ctx);
  requestAnimationFrame(animateDraw);
}

container.addEventListener("pointerup", ()=> drawing=false);
container.addEventListener("pointerleave", ()=> drawing=false);

// ===== サウンド =====
let audioCtx = null;
function playSound(){
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.frequency.value = 200 + Math.random()*600;
  gain.gain.value = 0.05;
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.1);
}

// ===== クリア =====
document.getElementById("clear").onclick = ()=>{
  layers.forEach(l=>l.ctx.clearRect(0,0,l.canvas.width,l.canvas.height));
};

// 初期化
createDrawLayer();
resize();
redrawBackground();
</script>

</body>
</html>
