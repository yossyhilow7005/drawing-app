<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generative Tap Drawing</title>

<style>
body {
  margin:0;
  font-family: system-ui, sans-serif;
  background:#222;
  color:#fff;
  user-select:none;
  overflow: hidden;
}
#ui {
  padding:8px;
  background:#333;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  font-size:14px;
  position: relative;
  z-index: 10;
}
canvas {
  position:absolute;
  touch-action: none;
}
label { display: flex; align-items: center; gap: 4px; }
button { font-size:14px; cursor: pointer; }
fieldset { display: flex; gap: 8px; border: 1px solid #555; padding: 4px 8px; border-radius: 4px; }
legend { padding: 0 4px; }
</style>
</head>

<body>

<div id="ui">
  <label>色 <input type="color" id="color" value="#ffffff"></label>
  <label>太さ <input type="range" id="size" min="1" max="20" value="4"></label>
  <label>透明度 <input type="range" id="alpha" min="0.05" max="1" step="0.05" value="0.8"></label>

  <label>背景色 <input type="color" id="bgColor" value="#000000"></label>

  <label>レイヤー
    <select id="layer">
      <option value="0">Layer 1</option>
      <option value="1">Layer 2</option>
    </select>
  </label>

  <fieldset>
    <legend>描画種類</legend>
    <label><input type="checkbox" class="shape" value="line" checked>直線</label>
    <label><input type="checkbox" class="shape" value="curve" checked>曲線</label>
    <label><input type="checkbox" class="shape" value="rect">四角</label>
    <label><input type="checkbox" class="shape" value="circle">円</label>
  </fieldset>

  <label>線表現
    <select id="style">
      <option value="water">水彩</option>
      <option value="marker">蛍光ペン</option>
      <option value="crayon">クレヨン</option>
    </select>
  </label>

  <button id="btnExport">PNG保存</button>
</div>

<div id="canvas-container" style="position:absolute; top:0; left:0; width:100%; height:100%; background:#000000;">
  <canvas id="canvas0"></canvas>
  <canvas id="canvas1"></canvas>
</div>

<script>
const ui = document.getElementById("ui");
const color = document.getElementById("color");
const size = document.getElementById("size");
const alpha = document.getElementById("alpha");
const bgColor = document.getElementById("bgColor");
const layer = document.getElementById("layer");
const style = document.getElementById("style");
const btnExport = document.getElementById("btnExport");
const canvasContainer = document.getElementById("canvas-container");

const canvases = [
  document.getElementById("canvas0"),
  document.getElementById("canvas1")
];
const ctxs = canvases.map(c => c.getContext("2d"));

// Web Audio APIの初期化（ユーザーの操作後に有効化される）
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

// 効果音を鳴らす関数
function playSound(type) {
  initAudio();
  if (!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  const now = audioCtx.currentTime;

  // 図形やスタイルによって音色を変える
  if (type === "line" || type === "curve") {
    // スッと鳴る音（サイン波）
    osc.type = "sine";
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.15);
    osc.start(now);
    osc.stop(now + 0.15);
  } else if (type === "rect" || type === "circle") {
    // ポンッと弾ける音（三角波）
    osc.type = "triangle";
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
    gain.gain.setValueAtTime(0.4, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.1);
    osc.start(now);
    osc.stop(now + 0.1);
  }
}

function resize(){
  const h = innerHeight - ui.offsetHeight;
  canvasContainer.style.top = ui.offsetHeight + "px";
  canvasContainer.style.height = h + "px";

  canvases.forEach(c=>{
    if (c.width !== innerWidth || c.height !== h) {
      c.width = innerWidth;
      c.height = h;
    }
    c.style.top = "0px";
  });
}
resize();
addEventListener("resize", resize);

function applyStyle(ctx){
  ctx.strokeStyle = color.value;
  ctx.lineWidth = size.value;
  ctx.globalAlpha = alpha.value;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.shadowBlur = 0;
  ctx.globalCompositeOperation = "source-over";

  if(style.value==="water"){
    ctx.shadowBlur = 20;
    ctx.shadowColor = color.value;
  }
  if(style.value==="marker"){
    ctx.globalCompositeOperation = "screen"; 
  }
  if(style.value==="crayon"){
    ctx.lineWidth = size.value * 1.2;
    ctx.setLineDash([1, 4]);
  } else {
    ctx.setLineDash([]);
  }
}

// アニメーションを1回だけ安全に実行するための管理変数
let isDrawing = false;

function drawAnimated(ctx, drawFn){
  let t = 0.05;
  function step(){
    drawFn(t);
    t += 0.05;
    if(t <= 1) {
      requestAnimationFrame(step);
    } else {
      isDrawing = false; // アニメーション終了時にフラグを解除
    }
  }
  step();
}

function drawRandom(){
  // すでに描画中の場合は、連打されても無視する
  if (isDrawing) return;
  isDrawing = true;

  const ctx = ctxs[layer.value];
  applyStyle(ctx);

  const w = ctx.canvas.width;
  const h = ctx.canvas.height;
  const shapes = [...document.querySelectorAll(".shape:checked")].map(s=>s.value);
  if(!shapes.length) {
    isDrawing = false;
    return;
  }

  const type = shapes[Math.floor(Math.random()*shapes.length)];
  const x1 = Math.random()*w;
  const y1 = Math.random()*h;
  const x2 = Math.random()*w;
  const y2 = Math.random()*h;

  // 効果音を再生
  playSound(type);

  drawAnimated(ctx,(p)=>{
    ctx.beginPath();
    if(type==="line"){
      ctx.moveTo(x1,y1);
      ctx.lineTo(x1+(x2-x1)*p,y1+(y2-y1)*p);
    }
    if(type==="curve"){
      ctx.moveTo(x1,y1);
      ctx.quadraticCurveTo(x2,y1,x1+(x2-x1)*p,y1+(y2-y1)*p);
    }
    if(type==="rect"){
      ctx.strokeRect(x1,y1,(x2-x1)*p,(y2-y1)*p);
      return; 
    }
    if(type==="circle"){
      ctx.arc(x1,y1,Math.abs(x2-x1)*p,0,Math.PI*2);
    }
    ctx.stroke();
  });
}

/* タップ・クリックイベント */
// タッチ環境とマウス環境で「二重発火」しないよう、フラグや防止策を入れて1タップ1回に制限
document.addEventListener("touchstart", e => {
  if(e.target.closest("#ui")) return;
  e.preventDefault(); // マウスイベントの疑似発火を防止
  drawRandom();
}, {passive: false});

document.addEventListener("mousedown", e => {
  if (e.button !== 0) return; // 左クリックのみ
  if(e.target.closest("#ui")) return;
  drawRandom();
});

bgColor.oninput=()=>{
  canvasContainer.style.background = bgColor.value;
};

/* PNG書き出し */
btnExport.onclick=()=>{
  const out=document.createElement("canvas");
  const w = canvases[0].width;
  const h = canvases[0].height;
  out.width = w;
  out.height = h;
  const octx=out.getContext("2d");
  
  octx.fillStyle = bgColor.value;
  octx.fillRect(0, 0, w, h);
  
  canvases.forEach(c=>octx.drawImage(c,0,0));
  
  const a=document.createElement("a");
  a.href=out.toDataURL("image/png");
  a.download="art.png";
  a.click();
};
</script>

</body>
</html>
