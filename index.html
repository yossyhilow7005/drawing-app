<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Generative Drawing App</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

#toolbar {
  position: fixed;
  top: env(safe-area-inset-top);
  left: 0;
  right: 0;
  background: rgba(20,20,20,0.95);
  padding: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  z-index: 10;
}

label { font-size: 14px; }

button, input {
  min-height: 36px;
}

#canvasContainer {
  position: absolute;
  top: calc(env(safe-area-inset-top) + 120px);
  left: 0;
  right: 0;
  bottom: env(safe-area-inset-bottom);
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  touch-action: none;
}
</style>
</head>

<body>

<div id="toolbar">
  太さ <input type="range" id="size" min="1" max="40" value="10">
  透明度 <input type="range" id="alpha" min="0.05" max="1" step="0.05" value="0.8">
  色 <input type="color" id="color" value="#ffffff">

  背景色 <input type="color" id="bgColor" value="#000000">
  背景画像 <input type="file" id="bgImage" accept="image/*">

  <label><input type="checkbox" class="shape" value="line" checked>直線</label>
  <label><input type="checkbox" class="shape" value="curve" checked>曲線</label>
  <label><input type="checkbox" class="shape" value="rect">四角</label>
  <label><input type="checkbox" class="shape" value="circle">円</label>

  <label><input type="radio" name="style" value="normal" checked>通常</label>
  <label><input type="radio" name="style" value="water">水彩</label>
  <label><input type="radio" name="style" value="neon">蛍光</label>
  <label><input type="radio" name="style" value="crayon">クレヨン</label>

  <button id="clear">クリア</button>
</div>

<div id="canvasContainer"></div>

<script>
const container = document.getElementById("canvasContainer");

// ===== 背景 =====
const bgCanvas = document.createElement("canvas");
const bgCtx = bgCanvas.getContext("2d");
container.appendChild(bgCanvas);

// ===== 描画 =====
const drawCanvas = document.createElement("canvas");
const ctx = drawCanvas.getContext("2d");
container.appendChild(drawCanvas);

let drawing = false;
let bgImg = null;

function resize() {
  const w = window.innerWidth;
  const h = container.clientHeight;
  [bgCanvas, drawCanvas].forEach(c => {
    c.width = w;
    c.height = h;
  });
  redrawBg();
}
window.addEventListener("resize", resize);

function redrawBg() {
  bgCtx.fillStyle = bgColor.value;
  bgCtx.fillRect(0,0,bgCanvas.width,bgCanvas.height);
  if (bgImg) bgCtx.drawImage(bgImg,0,0,bgCanvas.width,bgCanvas.height);
}

bgColor.oninput = redrawBg;
bgImage.onchange = e => {
  const img = new Image();
  img.onload = () => { bgImg = img; redrawBg(); };
  img.src = URL.createObjectURL(e.target.files[0]);
};

// ===== サウンド =====
let audioCtx;
function playSound(){
  audioCtx ??= new (window.AudioContext||webkitAudioContext)();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.frequency.value = 200 + Math.random()*600;
  g.gain.value = 0.04;
  o.connect(g).connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + 0.1);
}

// ===== 描画ロジック =====
function drawRandom() {
  const w = drawCanvas.width;
  const h = drawCanvas.height;

  ctx.globalAlpha = alpha.value;
  ctx.strokeStyle = color.value;
  ctx.fillStyle = color.value;
  ctx.lineWidth = size.value;
  ctx.lineCap = "round";

  const shapes = [...document.querySelectorAll(".shape:checked")].map(s=>s.value);
  if (!shapes.length) return;

  const type = shapes[Math.floor(Math.random()*shapes.length)];
  const x = Math.random()*w;
  const y = Math.random()*h;

  ctx.beginPath();

  if (type === "line") {
    ctx.moveTo(x,y);
    ctx.lineTo(Math.random()*w, Math.random()*h);
    ctx.stroke();
  }

  if (type === "curve") {
    ctx.moveTo(x,y);
    ctx.quadraticCurveTo(
      Math.random()*w, Math.random()*h,
      Math.random()*w, Math.random()*h
    );
    ctx.stroke();
  }

  if (type === "rect") {
    ctx.strokeRect(x,y,50+Math.random()*150,50+Math.random()*150);
  }

  if (type === "circle") {
    ctx.arc(x,y,20+Math.random()*80,0,Math.PI*2);
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
}

container.addEventListener("pointerdown", ()=>{
  drawing = true;
  playSound();
  animate();
});

function animate(){
  if (!drawing) return;
  applyStyle();
  drawRandom();
  requestAnimationFrame(animate);
}

container.addEventListener("pointerup", ()=> drawing=false);
container.addEventListener("pointerleave", ()=> drawing=false);

// ===== スタイル =====
function applyStyle(){
  const style = document.querySelector("input[name=style]:checked").value;
  ctx.shadowBlur = 0;
  if (style === "water") ctx.globalAlpha *= 0.6;
  if (style === "neon") { ctx.shadowBlur = 20; ctx.shadowColor = color.value; }
  if (style === "crayon") ctx.lineWidth = size.value * 1.5;
}

clear.onclick = ()=> ctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);

resize();
redrawBg();
</script>

</body>
</html>
